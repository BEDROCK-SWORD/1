<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;600;700;900&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --bg2: #1a1815;
    --bg3: #232018;
    --surface: #2a2520;
    --surface2: #332e28;
    --border: #4a4035;
    --accent: #c9a84c;
    --accent2: #e8c87a;
    --accent3: #f0d9a0;
    --text: #e8dcc8;
    --text2: #a89880;
    --text3: #6b5f50;
    --red: #c0392b;
    --red-light: #e74c3c;
    --green: #27ae60;
    --green-light: #2ecc71;
    --font-title: 'Amiri', serif;
    --font-body: 'Cairo', sans-serif;
    --radius: 16px;
    --shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.03) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* ===== HEADER ===== */
  .app-header {
    background: linear-gradient(135deg, var(--bg2), var(--bg3));
    border-bottom: 1px solid var(--border);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    width: 100%;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    width: 100%;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }

  .logo-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
  }

  .logo-text h1 {
    font-family: var(--font-title);
    font-size: 18px;
    color: var(--accent2);
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .logo-text p {
    font-size: 10px;
    color: var(--text3);
    margin-top: 1px;
    white-space: nowrap;
  }

  /* Settings icon only — no nav box */
  .header-settings-btn {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--accent);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .header-settings-btn:hover {
    background: var(--surface2);
    border-color: var(--accent);
  }

  /* Nav tabs — full width below header */
  .nav-bar {
    width: 100%;
    display: flex;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 0;
  }

  .nav-tab {
    flex: 1;
    padding: 10px 4px;
    text-align: center;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    transition: all 0.2s;
    border: none;
    background: none;
    font-family: var(--font-body);
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }

  .nav-tab.active {
    color: var(--accent);
    border-bottom: 2px solid var(--accent);
    background: rgba(201,168,76,0.06);
  }

  .nav-tab:hover:not(.active) {
    color: var(--accent2);
    background: rgba(201,168,76,0.04);
  }

  /* ===== MAIN ===== */
  .main {
    width: 100%;
    max-width: 100%;
    padding: 16px 12px 80px;
  }

  @media (min-width: 768px) {
    .main { max-width: 900px; margin: 0 auto; padding: 20px 20px 80px; }
    .logo-text h1 { font-size: 20px; }
  }

  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.25s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== DATE BAR ===== */
  .date-bar {
    background: linear-gradient(135deg, var(--surface), var(--surface2));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    width: 100%;
  }

  .date-info { display: flex; align-items: center; gap: 10px; }
  .date-icon { font-size: 24px; }

  .date-texts h2 {
    font-family: var(--font-title);
    font-size: 16px;
    color: var(--accent2);
  }

  .date-texts p { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .countdown-badge {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    text-align: center;
  }

  .countdown-badge .label { font-size: 10px; color: var(--text3); }
  .countdown-badge .time {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
  }

  /* center the countdown on mobile */
  @media (max-width: 500px) {
    .date-bar { justify-content: center; text-align: center; }
    .date-info { flex-direction: column; align-items: center; }
    .countdown-badge { width: 100%; }
    .countdown-badge .time { font-size: 28px; letter-spacing: 4px; }
  }

  /* ===== STATS GRID ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
    width: 100%;
  }

  @media (min-width: 600px) {
    .stats-grid { grid-template-columns: repeat(4, 1fr); }
  }

  .stat-card {
    background: linear-gradient(135deg, var(--surface), var(--surface2));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 14px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
    width: 100%;
  }

  .stat-card:hover { transform: translateY(-2px); }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 50px; height: 50px;
    background: radial-gradient(circle, rgba(201,168,76,0.12), transparent);
    border-radius: 0 var(--radius) 0 50px;
  }

  .stat-card.danger { border-color: var(--red); }
  .stat-card.danger::before { background: radial-gradient(circle, rgba(192,57,43,0.15), transparent); }

  .stat-label { font-size: 10px; color: var(--text3); margin-bottom: 5px; font-weight: 600; letter-spacing: 0.5px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--accent2); font-variant-numeric: tabular-nums; word-break: break-all; }
  .stat-value.danger { color: var(--red-light); }
  .stat-sub { font-size: 10px; color: var(--text3); margin-top: 3px; }
  .stat-icon { position: absolute; top: 10px; left: 10px; font-size: 18px; opacity: 0.35; }

  /* ===== BUDGET BARS ===== */
  .budget-section {
    background: linear-gradient(135deg, var(--surface), var(--surface2));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
    width: 100%;
  }

  .section-title {
    font-family: var(--font-title);
    font-size: 15px;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .budget-bar-wrap { margin-bottom: 12px; }
  .budget-bar-header {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 5px;
  }

  .budget-bar-track {
    height: 7px;
    background: var(--bg);
    border-radius: 99px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .budget-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--green), var(--green-light));
    transition: width 0.5s ease, background 0.3s;
  }

  .budget-bar-fill.warn { background: linear-gradient(90deg, #e67e22, #f39c12); }
  .budget-bar-fill.danger { background: linear-gradient(90deg, var(--red), var(--red-light)); }

  .over-budget-msg { font-size: 11px; color: var(--red-light); margin-top: 3px; font-weight: 600; }

  /* ===== ADD FORM ===== */
  .add-card {
    background: linear-gradient(135deg, var(--surface), var(--surface2));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
    width: 100%;
  }

  .form-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    width: 100%;
  }

  .form-group {
    flex: 1;
    min-width: 120px;
  }

  .form-group label {
    display: block;
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 5px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .form-group input, .form-group select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
    direction: rtl;
    -webkit-appearance: none;
  }

  .form-group input:focus, .form-group select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
  }

  .form-group input::placeholder { color: var(--text3); }

  .btn-add {
    padding: 10px 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: #1a1400;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    font-family: var(--font-body);
    align-self: flex-end;
    transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(201,168,76,0.3);
    white-space: nowrap;
    height: 42px;
  }

  .btn-add:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,168,76,0.4); }

  @media (max-width: 500px) {
    .form-row { flex-direction: column; }
    .btn-add { width: 100%; }
  }

  /* ===== ITEMS LIST ===== */
  .items-section {
    background: linear-gradient(135deg, var(--surface), var(--surface2));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 14px;
    width: 100%;
  }

  .items-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .items-list { padding: 8px; }

  .item-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 10px;
    border-radius: 10px;
    border: 1px solid transparent;
    transition: all 0.2s;
    margin-bottom: 5px;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .item-row:hover { background: var(--bg); border-color: var(--border); }

  .item-num {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--text3);
    font-weight: 600;
    flex-shrink: 0;
  }

  .item-name {
    flex: 1;
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
    min-width: 0;
    word-break: break-word;
  }

  .item-name.editing {
    background: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 3px 7px;
    outline: none;
    font-family: var(--font-body);
    color: var(--text);
  }

  .item-price {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    min-width: 70px;
    text-align: left;
    flex-shrink: 0;
  }

  .item-price.editing {
    background: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 3px 7px;
    outline: none;
    font-family: var(--font-body);
    color: var(--accent);
    width: 80px;
  }

  .item-time {
    font-size: 10px;
    color: var(--text3);
    min-width: 46px;
    text-align: center;
    flex-shrink: 0;
  }

  .item-actions { display: flex; gap: 4px; }

  .btn-sm {
    width: 28px; height: 28px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .btn-sm:hover { transform: scale(1.1); }
  .btn-sm.edit:hover { border-color: var(--accent); color: var(--accent); background: rgba(201,168,76,0.1); }
  .btn-sm.del:hover { border-color: var(--red); color: var(--red-light); background: rgba(192,57,43,0.1); }
  .btn-sm.save { color: var(--green-light); border-color: var(--green); }

  .empty-state { text-align: center; padding: 36px 16px; color: var(--text3); }
  .empty-state .emoji { font-size: 36px; margin-bottom: 8px; }
  .empty-state p { font-size: 13px; }

  /* ===== HISTORY ===== */
  .history-month {
    background: linear-gradient(135deg, var(--surface), var(--surface2));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    width: 100%;
  }

  .month-header {
    padding: 12px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }

  .month-header h3 { font-family: var(--font-title); font-size: 15px; color: var(--accent); }
  .month-total { font-size: 13px; font-weight: 700; color: var(--accent2); }
  .month-body { padding: 8px; }
  .week-group { margin-bottom: 10px; }

  .week-label {
    font-size: 10px;
    color: var(--text3);
    font-weight: 700;
    letter-spacing: 1px;
    padding: 5px 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 5px;
  }

  .day-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px;
    border-radius: 8px;
    margin-bottom: 3px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .day-row:hover { background: var(--bg); }
  .day-row.over-daily { border-right: 3px solid var(--red); }
  .day-name { font-size: 12px; color: var(--text2); }
  .day-items { font-size: 10px; color: var(--text3); }
  .day-total { font-size: 13px; font-weight: 700; color: var(--accent); }
  .day-total.danger { color: var(--red-light); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.78);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px;
    max-width: 480px;
    width: 100%;
    max-height: 82vh;
    overflow-y: auto;
    box-shadow: var(--shadow);
    animation: modalIn 0.25s ease;
    direction: rtl;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .modal-title { font-family: var(--font-title); font-size: 18px; color: var(--accent); }

  .modal-close {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-item-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .modal-item-row:last-child { border-bottom: none; }

  .modal-total {
    text-align: center;
    padding: 14px;
    background: var(--bg);
    border-radius: 10px;
    margin-top: 14px;
  }

  .modal-total .val { font-size: 26px; font-weight: 700; color: var(--accent2); }
  .modal-total .lbl { font-size: 11px; color: var(--text3); margin-top: 3px; }

  /* ===== SETTINGS ===== */
  .settings-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    width: 100%;
  }

  @media (min-width: 640px) {
    .settings-grid { grid-template-columns: 1fr 1fr; }
  }

  .settings-card {
    background: linear-gradient(135deg, var(--surface), var(--surface2));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    width: 100%;
  }

  .settings-card h3 {
    font-family: var(--font-title);
    font-size: 15px;
    color: var(--accent);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 10px;
    flex-wrap: wrap;
  }

  .setting-label { font-size: 12px; color: var(--text2); flex: 1; min-width: 100px; }

  .setting-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    width: 130px;
    direction: rtl;
    text-align: center;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .setting-input:focus { outline: none; border-color: var(--accent); }

  .color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .color-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    gap: 8px;
  }

  .color-row label { font-size: 11px; color: var(--text2); }

  .color-row input[type="color"] {
    width: 38px;
    height: 30px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: transparent;
    cursor: pointer;
    padding: 2px;
  }

  .font-selector { display: flex; flex-direction: column; gap: 7px; }

  .font-option {
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text2);
    transition: all 0.2s;
    background: var(--bg);
  }

  .font-option.selected { border-color: var(--accent); color: var(--accent); background: rgba(201,168,76,0.08); }
  .font-option:hover { border-color: var(--accent); color: var(--accent); }

  .bg-presets {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 7px;
    margin-bottom: 10px;
  }

  .bg-preset {
    height: 36px;
    border-radius: 7px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s;
  }

  .bg-preset:hover { border-color: var(--accent2); }

  .btn-save-settings {
    width: 100%;
    padding: 11px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: #1a1400;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    font-family: var(--font-body);
    margin-top: 6px;
    transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(201,168,76,0.3);
  }

  .btn-save-settings:hover { transform: translateY(-1px); }

  /* ===== WISHLIST ===== */
  .wishlist-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    width: 100%;
  }

  @media (min-width: 600px) {
    .wishlist-grid { grid-template-columns: repeat(3, 1fr); }
  }

  @media (min-width: 900px) {
    .wishlist-grid { grid-template-columns: repeat(4, 1fr); }
  }

  .wish-card {
    background: linear-gradient(135deg, var(--surface), var(--surface2));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: slideIn 0.25s ease;
  }

  .wish-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 28px rgba(0,0,0,0.4);
    border-color: var(--accent);
  }

  .wish-img {
    width: 100%;
    height: 130px;
    object-fit: cover;
    display: block;
    background: var(--bg);
  }

  .wish-img-placeholder {
    width: 100%;
    height: 130px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    color: var(--text3);
  }

  .wish-body { padding: 12px; }
  .wish-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .wish-price { font-size: 15px; font-weight: 700; color: var(--accent2); margin-bottom: 6px; }
  .wish-desc { font-size: 11px; color: var(--text3); line-height: 1.5; margin-bottom: 10px; }

  .wish-actions { display: flex; gap: 6px; }

  .btn-wish-del {
    flex: 1;
    padding: 7px 4px;
    border: 1px solid var(--red);
    border-radius: 7px;
    background: transparent;
    color: var(--red-light);
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    transition: all 0.2s;
  }

  .btn-wish-del:hover { background: rgba(192,57,43,0.15); }

  .btn-wish-buy {
    flex: 1;
    padding: 7px 4px;
    border: none;
    border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #1a1400;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 700;
    transition: all 0.2s;
  }

  .btn-wish-buy:hover { transform: scale(1.02); }

  /* Add wish form */
  .add-wish-form {
    background: linear-gradient(135deg, var(--surface), var(--surface2));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
    width: 100%;
  }

  /* Image upload */
  .img-upload-area {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    background: var(--bg);
    position: relative;
  }

  .img-upload-area:hover { border-color: var(--accent); }
  .img-upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .img-upload-area .upload-icon { font-size: 24px; margin-bottom: 4px; }
  .img-upload-area .upload-text { font-size: 11px; color: var(--text3); }
  .img-preview { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; margin: 0 auto 4px; display: block; }

  /* ===== FOOTER ===== */
  .dev-credit {
    text-align: center;
    padding: 16px;
    font-size: 11px;
    color: var(--text3);
  }

  .dev-credit span { color: var(--accent); font-weight: 700; font-family: 'Courier New', monospace; }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--accent2);
    z-index: 999;
    transition: transform 0.3s;
    white-space: nowrap;
    box-shadow: var(--shadow);
  }

  .
